# Development config — uses temp paths, no root required.
# Set VISAGE_CONFIG=dev/config.toml in your shell.

[device]
# path auto-detected (omit for auto-detect, or set explicitly)
max_height = 480

[recognition]
threshold = 0.50
timeout_secs = 5

[daemon]
# mode = "daemon"  # or "oneshot" for daemonless development
socket_path = "/tmp/visage-dev.sock"
model_dir = "./models"

[storage]
db_path = "/tmp/visage-dev.db"

[security]
disabled = false
require_ir = true
require_frame_variance = true

[snapshots]
dir = "/tmp/visage-dev-snapshots"
