[device]
path = "/dev/video2"
max_height = 480

[recognition]
threshold = 0.50
timeout_secs = 5

[daemon]
socket_path = "/tmp/howdy-dev.sock"
model_dir = "./models"

[storage]
db_path = "/tmp/howdy-dev.db"

[security]
disabled = false
require_ir = true
require_frame_variance = true

[snapshots]
dir = "/tmp/howdy-dev-snapshots"

[debug]
verbose = true
