name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.4.44"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          chmod +x mdbook
      - name: Build mdBook
        run: ./mdbook build book/
      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp website/* _site/
          cp -r book/book/* _site/docs/
      - name: Download APT repository from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/apt-download

          if gh release download --pattern 'apt-repo.tar.gz' --dir /tmp/apt-download --repo "${{ github.repository }}" 2>/dev/null; then
            echo "Downloaded apt-repo.tar.gz from latest release"
            mkdir -p _site/apt
            tar -xzf /tmp/apt-download/apt-repo.tar.gz -C _site/apt/
            echo "=== APT repo files included in site ==="
            find _site/apt -type f | sort
          else
            echo "No apt-repo.tar.gz found in any release. Deploying docs only."
            echo "This is expected before the first stable release with APT publishing."
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
