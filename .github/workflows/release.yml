name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libv4l-dev \
            libpam0g-dev \
            clang \
            libxkbcommon-dev \
            libwayland-dev \
            libtss2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --features tpm

      - name: Prepare artifacts
        run: |
          mkdir -p release
          cp target/release/facelock release/facelock-x86_64-linux-gnu
          cp target/release/libpam_facelock.so release/pam_facelock.so
          cd release && sha256sum * > SHA256SUMS

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/facelock-x86_64-linux-gnu
            release/pam_facelock.so
            release/SHA256SUMS
          generate_release_notes: true

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libv4l-dev \
            libpam0g-dev \
            clang \
            libxkbcommon-dev \
            libwayland-dev \
            libtss2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --workspace

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          PKG_VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_DIR="facelock_${PKG_VERSION}_amd64"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/lib/security"
          mkdir -p "${PKG_DIR}/etc/facelock"
          mkdir -p "${PKG_DIR}/usr/lib/systemd/system"
          mkdir -p "${PKG_DIR}/usr/lib/sysusers.d"
          mkdir -p "${PKG_DIR}/usr/lib/tmpfiles.d"
          mkdir -p "${PKG_DIR}/usr/share/pam-configs"

          # Control file
          cat > "${PKG_DIR}/DEBIAN/control" <<CTRL
          Package: facelock
          Version: ${PKG_VERSION}
          Architecture: amd64
          Maintainer: Facelock Contributors <facelock@example.com>
          Depends: libpam-runtime
          Section: admin
          Priority: optional
          Homepage: https://github.com/tyvsmith/facelock
          Description: Face authentication for Linux PAM
           Facelock provides Windows Hello-style face authentication for Linux
           using IR anti-spoofing, ONNX inference, and PAM integration.
          CTRL
          # Remove leading whitespace from heredoc (indented for readability)
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"

          # postinst
          cp dist/debian/postinst "${PKG_DIR}/DEBIAN/postinst"
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          # prerm
          cp dist/debian/prerm "${PKG_DIR}/DEBIAN/prerm"
          chmod 755 "${PKG_DIR}/DEBIAN/prerm"

          # Install files
          install -m755 target/release/facelock "${PKG_DIR}/usr/bin/facelock"
          install -m755 target/release/libpam_facelock.so "${PKG_DIR}/lib/security/pam_facelock.so"
          install -m644 config/facelock.toml "${PKG_DIR}/etc/facelock/config.toml"
          install -m644 systemd/facelock-daemon.service "${PKG_DIR}/usr/lib/systemd/system/facelock-daemon.service"
          install -m644 systemd/facelock-daemon.socket "${PKG_DIR}/usr/lib/systemd/system/facelock-daemon.socket"
          install -m644 dist/facelock.sysusers "${PKG_DIR}/usr/lib/sysusers.d/facelock.conf"
          install -m644 dist/facelock.tmpfiles "${PKG_DIR}/usr/lib/tmpfiles.d/facelock.conf"

          if [ -f dist/debian/pam-auth-update ]; then
            install -m644 dist/debian/pam-auth-update "${PKG_DIR}/usr/share/pam-configs/facelock"
          fi

          dpkg-deb --build "${PKG_DIR}"

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: facelock_*.deb

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    needs: build
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rust cargo clang-devel \
            pam-devel libv4l-devel \
            rpm-build systemd-rpm-macros \
            gcc gcc-c++ \
            wayland-devel libxkbcommon-devel \
            tpm2-tss-devel

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: cargo build --release --workspace

      - name: Build RPM
        run: |
          PKG_VERSION="${{ steps.version.outputs.VERSION }}"

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p ~/rpmbuild/BUILDROOT

          # Copy spec file and set version
          cp dist/facelock.spec ~/rpmbuild/SPECS/facelock.spec
          sed -i "s/^Version:.*/Version:        ${PKG_VERSION}/" ~/rpmbuild/SPECS/facelock.spec

          # Build the RPM using the already-compiled binaries
          rpmbuild --define "_topdir $HOME/rpmbuild" \
                   --define "_sourcedir $(pwd)" \
                   --define "_builddir $(pwd)" \
                   --define "_buildrootdir $HOME/rpmbuild/BUILDROOT" \
                   --short-circuit -bb ~/rpmbuild/SPECS/facelock.spec

      - name: Copy RPM to workspace
        run: cp ~/rpmbuild/RPMS/x86_64/*.rpm ./ 2>/dev/null || cp ~/rpmbuild/RPMS/**/*.rpm ./ 2>/dev/null || true

      - name: Upload .rpm to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.rpm"
