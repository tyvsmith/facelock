# Visage configuration — default template
# Copy to /etc/visage/config.toml and edit

[device]
# path = "/dev/video0"   # Optional: camera device path (auto-detected if omitted)
# max_height = 480       # Max frame height (downscale if larger)
# rotation = 0           # Frame rotation: 0, 90, 180, 270

[recognition]
# threshold = 0.45       # Cosine similarity threshold for match
# timeout_secs = 5       # Auth timeout in seconds
# detection_confidence = 0.5  # Minimum face detection confidence
# nms_threshold = 0.4    # Non-maximum suppression threshold
# detector_model = "scrfd_2.5g_bnkps.onnx"   # or "det_10g.onnx" for higher accuracy
# embedder_model = "w600k_r50.onnx"           # or "glintr100.onnx" for higher accuracy
# execution_provider = "cpu"  # "cpu", "cuda", "tensorrt"
# threads = 4            # Number of ORT intra-op inference threads

[daemon]
# mode = "daemon"        # "daemon" (default) or "oneshot" (no daemon needed)
# socket_path = "/run/visage/visage.sock"
# model_dir = "/var/lib/visage/models"
# idle_timeout_secs = 0  # Socket-activated idle shutdown (0 = disabled)

[storage]
# db_path = "/var/lib/visage/visage.db"

[security]
# disabled = false
# abort_if_ssh = true
# abort_if_lid_closed = true
# require_ir = true
# require_frame_variance = true
# min_auth_frames = 3
# detection_notice = true

[notification]
# enabled = true

[snapshots]
# enabled = false
# dir = "/var/log/visage/snapshots"

# [tpm]
# seal_database = false       # Encrypt embeddings at rest with TPM
# pcr_binding = false         # Verify system integrity at startup
# pcr_indices = [0, 1, 2, 3, 7]
# tcti = "device:/dev/tpmrm0"
